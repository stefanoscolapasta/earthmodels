<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tree Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f1e8;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #splat-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
        }

        .info h3 {
            margin: 0 0 10px 0;
            color: #2d5016;
        }

        .info p {
            margin: 5px 0;
            color: #495057;
        }
    </style>
</head>
<body>
    <canvas id="splat-canvas"></canvas>

    <div class="info">
        <h3>3D Tree Viewer Test</h3>
        <p><strong>Hover</strong> over canvas to scatter</p>
        <p><strong>Scroll</strong> to increase effect</p>
        <p id="status">Loading...</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        console.log('Test script starting...');
        const canvas = document.getElementById('splat-canvas');
        const statusEl = document.getElementById('status');

        // Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xf5f1e8, 1);

        statusEl.textContent = 'Creating tree...';

        // Create simple tree
        const pointCount = 50000;
        const positions = new Float32Array(pointCount * 3);
        const colors = new Float32Array(pointCount * 3);

        for (let i = 0; i < pointCount; i++) {
            const i3 = i * 3;
            const isTrunk = Math.random() < 0.1;

            if (isTrunk) {
                const angle = Math.random() * Math.PI * 2;
                const height = Math.random() * 2.5;
                const r = Math.sqrt(Math.random()) * 0.12;
                positions[i3] = Math.cos(angle) * r;
                positions[i3 + 1] = height;
                positions[i3 + 2] = Math.sin(angle) * r;
                colors[i3] = 0.4;
                colors[i3 + 1] = 0.25;
                colors[i3 + 2] = 0.15;
            } else {
                const heightInCrown = Math.pow(Math.random(), 0.7) * 4;
                const angle = Math.random() * Math.PI * 2;
                const normalizedHeight = heightInCrown / 4;
                const maxR = 2 * Math.sin(normalizedHeight * Math.PI) * 0.8;
                const r = Math.sqrt(Math.random()) * maxR;
                positions[i3] = Math.cos(angle) * r;
                positions[i3 + 1] = 2.5 + heightInCrown;
                positions[i3 + 2] = Math.sin(angle) * r;
                const green = 0.2 + Math.random() * 0.1;
                colors[i3] = green * 0.5;
                colors[i3 + 1] = green * 1.3;
                colors[i3 + 2] = green * 0.4;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.02,
            vertexColors: true,
            sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        statusEl.textContent = `Ready! (${pointCount.toLocaleString()} points)`;

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Test ready!');
    </script>
</body>
</html>
