<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Tree Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f1e8;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        #splat-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.5;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 100vh 20px 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            color: #2d5016;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem;
            border-radius: 20px;
        }

        .info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            z-index: 100;
            font-size: 13px;
            max-width: 250px;
        }

        .info h3 {
            margin: 0 0 10px 0;
            color: #2d5016;
        }

        .stat {
            margin: 5px 0;
            padding: 5px;
            background: #f0f0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <canvas id="splat-canvas"></canvas>

    <div class="hero">
        <h1>Hover & Scroll to Interact</h1>
    </div>

    <div class="content">
        <h2>Scroll Down</h2>
        <p>The tree should scatter as you scroll...</p>
        <div style="height: 500px; background: rgba(255,255,255,0.8); padding: 20px; border-radius: 10px; margin: 20px 0;">
            <h3>More content</h3>
            <p>Keep scrolling to see the effect increase.</p>
        </div>
    </div>

    <div class="info">
        <h3>Stats</h3>
        <div class="stat">Scatter: <span id="scatter">0</span></div>
        <div class="stat">Mouse: <span id="mouse">0, 0</span></div>
        <div class="stat">Scroll: <span id="scroll">0</span></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        console.log('Starting interactive test...');

        const canvas = document.getElementById('splat-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0xf5f1e8, 0);

        // Create tree
        const pointCount = 50000;
        const positions = new Float32Array(pointCount * 3);
        const colors = new Float32Array(pointCount * 3);
        const originalPositions = new Float32Array(pointCount * 3);
        const velocities = new Float32Array(pointCount * 3);

        for (let i = 0; i < pointCount; i++) {
            const i3 = i * 3;
            const isTrunk = Math.random() < 0.1;

            if (isTrunk) {
                const angle = Math.random() * Math.PI * 2;
                const height = Math.random() * 2.5;
                const r = Math.sqrt(Math.random()) * 0.12;
                positions[i3] = Math.cos(angle) * r;
                positions[i3 + 1] = height;
                positions[i3 + 2] = Math.sin(angle) * r;
                colors[i3] = 0.4;
                colors[i3 + 1] = 0.25;
                colors[i3 + 2] = 0.15;
            } else {
                const heightInCrown = Math.pow(Math.random(), 0.7) * 4;
                const angle = Math.random() * Math.PI * 2;
                const normalizedHeight = heightInCrown / 4;
                const maxR = 2 * Math.sin(normalizedHeight * Math.PI) * 0.8;
                const r = Math.sqrt(Math.random()) * maxR;
                positions[i3] = Math.cos(angle) * r;
                positions[i3 + 1] = 2.5 + heightInCrown;
                positions[i3 + 2] = Math.sin(angle) * r;
                const green = 0.2 + Math.random() * 0.1;
                colors[i3] = green * 0.5;
                colors[i3 + 1] = green * 1.3;
                colors[i3 + 2] = green * 0.4;
            }

            originalPositions[i3] = positions[i3];
            originalPositions[i3 + 1] = positions[i3 + 1];
            originalPositions[i3 + 2] = positions[i3 + 2];
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.02,
            vertexColors: true,
            sizeAttenuation: true
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        // Interaction
        let mouseX = 0, mouseY = 0;
        let scatterAmount = 0;
        let targetScatter = 0;
        let time = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            document.getElementById('mouse').textContent = `${mouseX.toFixed(2)}, ${mouseY.toFixed(2)}`;
        });

        canvas.addEventListener('mouseenter', () => {
            targetScatter = 1.5;
            console.log('Mouse entered canvas');
        });

        canvas.addEventListener('mouseleave', () => {
            targetScatter = 0;
            console.log('Mouse left canvas');
        });

        window.addEventListener('scroll', () => {
            const scrollPercent = Math.min(window.scrollY / (window.innerHeight * 0.8), 1);
            targetScatter = scrollPercent * 2.0;
            document.getElementById('scroll').textContent = scrollPercent.toFixed(2);
        });

        function applyScatter() {
            const posArray = geometry.attributes.position.array;

            for (let i = 0; i < pointCount; i++) {
                const i3 = i * 3;
                const origX = originalPositions[i3];
                const origY = originalPositions[i3 + 1];
                const origZ = originalPositions[i3 + 2];

                if (scatterAmount > 0.01) {
                    const seed = origX * 12.9898 + origY * 78.233 + origZ * 45.164;
                    const rand = (Math.sin(seed) * 43758.5453) % 1;

                    const randX = Math.sin(rand * 6.28);
                    const randY = Math.abs(Math.sin(rand * 12.56)) * 0.6 + 0.4;
                    const randZ = Math.sin(rand * 18.84);

                    const mag = Math.sqrt(randX * randX + randY * randY + randZ * randZ);
                    const dirX = randX / mag;
                    const dirY = randY / mag;
                    const dirZ = randZ / mag;

                    const dx = origX - mouseX * 3;
                    const dy = origY - mouseY * 3;
                    const distToMouse = Math.sqrt(dx * dx + dy * dy);
                    const mouseInfluence = Math.max(0, 1 - distToMouse / 2.5);

                    const scatter = scatterAmount * (0.4 + mouseInfluence * 0.6);
                    const scatterDist = scatter * (Math.abs(rand) * 1.5 + 0.5);

                    velocities[i3] += dirX * scatterDist * 0.015;
                    velocities[i3 + 1] += dirY * scatterDist * 0.015;
                    velocities[i3 + 2] += dirZ * scatterDist * 0.015;

                    velocities[i3] *= 0.92;
                    velocities[i3 + 1] *= 0.92;
                    velocities[i3 + 2] *= 0.92;

                    posArray[i3] = origX + velocities[i3];
                    posArray[i3 + 1] = origY + velocities[i3 + 1] + Math.sin(time * 2 + rand * 6.28) * scatter * 0.15;
                    posArray[i3 + 2] = origZ + velocities[i3 + 2];
                } else {
                    posArray[i3] += (origX - posArray[i3]) * 0.08;
                    posArray[i3 + 1] += (origY - posArray[i3 + 1]) * 0.08;
                    posArray[i3 + 2] += (origZ - posArray[i3 + 2]) * 0.08;

                    velocities[i3] *= 0.85;
                    velocities[i3 + 1] *= 0.85;
                    velocities[i3 + 2] *= 0.85;
                }
            }

            geometry.attributes.position.needsUpdate = true;
        }

        function animate() {
            requestAnimationFrame(animate);

            time += 0.016;
            scatterAmount += (targetScatter - scatterAmount) * 0.06;

            document.getElementById('scatter').textContent = scatterAmount.toFixed(2);

            applyScatter();
            points.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        console.log('Interactive test ready!');
    </script>
</body>
</html>
